name: Deploy Client to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/client-web/**'
      - 'packages/core/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/client-web/**'
      - 'packages/core/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Setup Pages Infrastructure
        if: github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: Install Dependencies (Root Environment)
        run: npm ci

      - name: Compile Core Package Types
        run: npm run build -w @termiboard/core

      - name: Compile and Build Production Matrix
        run: npm run build -w termiboard-client-web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload Build Artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/client-web/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Framework to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
