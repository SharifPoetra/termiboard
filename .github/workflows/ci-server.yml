name: Server Continuous Integration (CI)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/core/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/core/**'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Dependencies (Root Environment)
        run: npm ci

      - name: Compile Core Package Types
        run: npm run build -w @termiboard/core

      - name: Execute ESLint Matrix Validation
        run: npm run lint -w termiboard-server

      - name: Verify Code Formatting (Prettier)
        run: npm run format -w termiboard-server -- --check

      - name: Compile and Build Production Binary (TSC)
        run: npm run build -w termiboard-server
