name: Server Continuous Integration (CI)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/server/**'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Dependencies (Root Environment)
        run: npm ci

      - name: Execute ESLint Matrix Validation
        run: |
          cd apps/server
          npm run lint

      - name: Verify Code Formatting (Prettier)
        run: |
          cd apps/server
          npm run format -- --check

      - name: Compile and Build Production Binary (TSC)
        run: |
          cd apps/server
          npm run build
